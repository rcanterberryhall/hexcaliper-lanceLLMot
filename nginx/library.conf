###############################################################################
# nginx/library.conf — Read-only public library subdomain
#
# Purpose:
#   Serve library.hexcaliper.com as a read-only view of the public technical
#   document library.  The X-Site-Mode: library header signals the API to:
#     - filter out M-Files-sourced (client) documents
#     - reject any write operations with 403
#
# Deployment:
#   Add a second nginx service in docker-compose.yml pointing to this file,
#   or swap this config into the nginx container for a dedicated library host.
#   The library nginx can share the same API container — no second API needed.
#
#   Example (docker-compose.yml addition):
#     nginx-library:
#       image: nginx:1.27-alpine
#       ports:
#         - "8081:8081"
#       volumes:
#         - ./nginx/library.conf:/etc/nginx/conf.d/default.conf:ro
#         - ./web:/usr/share/nginx/html:ro
#       depends_on:
#         - api
#       restart: unless-stopped
#       networks:
#         - app
###############################################################################

server {
    listen 8081;
    server_name _;

    # No uploads on the public library subdomain.
    client_max_body_size 1m;

    root /usr/share/nginx/html;
    index index.html;

    # ── Block all write/mutation API routes ───────────────────────────────────
    # Any POST/PUT/PATCH/DELETE to these prefixes is forbidden at the proxy layer.
    # The API also enforces 403 independently via the X-Site-Mode header.
    location ~ ^/api/(acquisition|escalation|connections|conversations|documents|workspace|chat) {
        return 403;
    }

    # ── Static assets ─────────────────────────────────────────────────────────
    location ~* \.(svg|ico|png|jpg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    location ~* \.(js|css)$ {
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri =404;
    }

    # ── API proxy — injects library mode header ───────────────────────────────
    location /api/ {
        resolver           127.0.0.11 valid=30s ipv6=off;
        set $upstream      api:8000;
        rewrite            ^/api/(.*) /$1 break;
        proxy_pass         http://$upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Signal public library mode to the API.
        proxy_set_header   X-Site-Mode       "library";
        proxy_buffering    off;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ── SPA fallback ──────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
