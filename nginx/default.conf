server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Truly immutable assets (content-addressed or rarely changed)
    location ~* \.(svg|ico|png|jpg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    # JS/CSS — always revalidate so deployments take effect immediately
    location ~* \.(js|css)$ {
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri =404;
    }

    # Proxy /api/* to FastAPI backend
    # Use Docker's embedded DNS resolver so "api" is resolved at request time,
    # not at nginx startup (avoids "host not found in upstream" crash).
    location /api/ {
        resolver           127.0.0.1 valid=30s ipv6=off;
        set $upstream      127.0.0.1:8000;
        rewrite            ^/api/(.*) /$1 break;
        proxy_pass         http://$upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Cf-Access-Authenticated-User-Email $http_cf_access_authenticated_user_email;
        proxy_buffering    off;
        proxy_read_timeout 150s;
        proxy_send_timeout 150s;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}