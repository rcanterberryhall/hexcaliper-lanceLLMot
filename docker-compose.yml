services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:8080"   # expose only this port to the host
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./web:/usr/share/nginx/html:ro
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - app

  api:
    build: ./api
    # host.docker.internal resolves to the host gateway so the api container
    # can reach Ollama running on the host at port 11434.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      OLLAMA_BASE_URL: "http://host.docker.internal:11434"
      LD_LIBRARY_PATH: "/app:/usr/local/lib"
      DEFAULT_MODEL: "llama3:8b"
      MAX_INPUT_CHARS: "20000"
      REQUEST_TIMEOUT_SECONDS: "120"
    volumes:
      - ./data:/app/data
    devices:
      - /dev/nvidiactl:/dev/nvidiactl
      - /dev/nvidia0:/dev/nvidia0
      - /dev/nvidia1:/dev/nvidia1
    restart: unless-stopped
    networks:
      - app

  # ── Public library subdomain (optional) ──────────────────────────────────
  # Serves library.hexcaliper.com as a read-only view of public library docs.
  # Shares the same API container — the X-Site-Mode: library nginx header
  # activates filtering and blocks writes at both the proxy and API layers.
  #
  # To enable: uncomment this block and expose port 8081 on your reverse proxy,
  # pointing library.hexcaliper.com at this container.
  #
  # nginx-library:
  #   image: nginx:1.27-alpine
  #   ports:
  #     - "8081:8081"
  #   volumes:
  #     - ./nginx/library.conf:/etc/nginx/conf.d/default.conf:ro
  #     - ./web:/usr/share/nginx/html:ro
  #   depends_on:
  #     - api
  #   restart: unless-stopped
  #   networks:
  #     - app

networks:
  app:
    driver: bridge
