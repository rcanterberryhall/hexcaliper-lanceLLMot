services:
  lancellmot-nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:8080"   # expose only this port to the host
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./web:/usr/share/nginx/html:ro
    depends_on:
      - lancellmot-api
    restart: unless-stopped
    networks:
      - app

  lancellmot-api:
    build: ./api
    # host.docker.internal resolves to the host gateway so the api container
    # can reach merLLM (and through it, Ollama) running on the host.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      OLLAMA_BASE_URL: "http://host.docker.internal:11400"
      MERLLM_URL:      "http://host.docker.internal:11400"
      LD_LIBRARY_PATH: "/app:/usr/local/lib"
      DEFAULT_MODEL: "qwen3:32b"
      MAX_INPUT_CHARS: "20000"
      REQUEST_TIMEOUT_SECONDS: "120"
      # If migrating from a prior install, rename data/hexcaliper.db to data/lancellmot.db
      # or set DB_PATH explicitly: DB_PATH: "/app/data/hexcaliper.db"
      DB_PATH: "/app/data/lancellmot.db"
    volumes:
      - ./data:/app/data
    devices:
      - /dev/nvidiactl:/dev/nvidiactl
      - /dev/nvidia0:/dev/nvidia0
      - /dev/nvidia1:/dev/nvidia1
    restart: unless-stopped
    networks:
      - app

  # ── Public library subdomain ──────────────────────────────────────────────
  # Serves library.hexcaliper.com as a read-only view of public library docs.
  lancellmot-nginx-library:
    image: nginx:1.27-alpine
    ports:
      - "8081:8081"
    volumes:
      - ./nginx/library.conf:/etc/nginx/conf.d/default.conf:ro
      - ./web:/usr/share/nginx/html:ro
    depends_on:
      - lancellmot-api
    restart: unless-stopped
    networks:
      - app

networks:
  app:
    driver: bridge
